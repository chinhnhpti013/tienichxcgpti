<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>SOS Khu vực Quảng Ninh (013)</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>
<i class="fa-solid fa-car"></i>
SOS Khu vực Quảng Ninh (013)
</h1>

<p>AI Tra cứu giá phụ tùng & giá trị xe</p>

</header>


<section class="scan">

<h2>Quét ảnh đăng kiểm</h2>

<input type="file" id="imageUpload">

<button onclick="scanImage()">
<i class="fa-solid fa-camera"></i>
Quét thông tin
</button>

</section>


<section class="form">

<h2>Thông tin xe</h2>

<input id="plate" placeholder="Biển kiểm soát">

<input id="vin" placeholder="Số VIN">

<input id="brand" placeholder="Hãng xe">

<input id="model" placeholder="Model">

<input id="year" placeholder="Năm sản xuất">

<select id="condition">

<option>Mới</option>
<option>Tốt</option>
<option>Trung bình</option>
<option>Tai nạn nhẹ</option>
<option>Tai nạn nặng</option>

</select>

<select id="region">

<option selected>Quảng Ninh</option>
<option>Hà Nội</option>
<option>TP HCM</option>

</select>

</section>


<section class="actions">

<button onclick="lookupParts()">
Tra cứu giá phụ tùng
</button>

<button onclick="lookupCarValue()">
Định giá xe
</button>

<button onclick="resetApp()">
Reload
</button>

</section>


<section id="result">

<h2>Kết quả AI</h2>

<div id="carValue"></div>

<table id="partsTable">

<thead>

<tr>
<th>Phụ tùng</th>
<th>Giá thấp</th>
<th>Giá TB</th>
<th>Giá cao</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>


<canvas id="chart"></canvas>


<script type="module" src="app.js"></script>

</body>

</html>
